name: Build and Push Docker Images

on: 
  push:
    branches:
      - main

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME}}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout the repo
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
             ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/task-board-frontend:latest
             ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/task-board-frontend:${{ github.sha }}

          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/task-board-frontend:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/task-board-frontend:buildcache,mode=max

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/task-board-backend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/task-board-backend:${{ github.sha }}
          
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/task-board-backend:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/task-board-backend:buildcache,mode=max

      - name: Build completion noti
        run: |
          echo "[+] Docker images built and pushed successfully!"
          echo "Frontend: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/task-board-frontend:latest"
          echo "Backend: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/task-board-backend:latest"
          echo ""
          echo "Check Docker Hub: https://hub.docker.com/u/${{ secrets.DOCKER_USERNAME }}"


      
